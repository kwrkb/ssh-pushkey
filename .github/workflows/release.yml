name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-X main.version=${VERSION}"

          GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/ssh-pushkey-windows-amd64.exe
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/ssh-pushkey-linux-amd64
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/ssh-pushkey-darwin-amd64
          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/ssh-pushkey-darwin-arm64

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${GITHUB_REF_NAME} dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
