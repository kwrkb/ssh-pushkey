stages:
  - test
  - release

test:
  stage: test
  image: golang:1.26
  script:
    - go test ./...

vet:
  stage: test
  image: golang:1.26
  script:
    - go vet ./...

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p}" CHANGELOG.md > /tmp/release-notes.md
      if [ ! -s /tmp/release-notes.md ]; then
        echo "Release ${CI_COMMIT_TAG}" > /tmp/release-notes.md
      fi
      release-cli create --name "Release ${CI_COMMIT_TAG}" --tag-name "$CI_COMMIT_TAG" --description "$(cat /tmp/release-notes.md)"
