stages:
  - test
  - release

test:
  stage: test
  image: golang:1.26
  script:
    - go test ./...

vet:
  stage: test
  image: golang:1.26
  script:
    - go vet ./...

release:
  stage: release
  image: golang:1.26
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  before_script:
    - curl -sL "https://gitlab.com/gitlab-org/cli/-/releases/v1.46.1/downloads/glab_1.46.1_Linux_x86_64.tar.gz" | tar xz -C /usr/local/bin --strip-components=1 bin/glab
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[${VERSION}\]/d;/^## \[/d;p}" CHANGELOG.md > /tmp/release-notes.md
      if [ ! -s /tmp/release-notes.md ]; then
        echo "Release ${CI_COMMIT_TAG}" > /tmp/release-notes.md
      fi
      glab release create "$CI_COMMIT_TAG" --notes-file /tmp/release-notes.md
