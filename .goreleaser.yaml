# GoReleaser config — GitHub is the canonical release/distribution source.
# Release notes are supplied from CHANGELOG.md via the workflow's
# `--release-notes` flag (see .github/workflows/release.yml), so GoReleaser's
# own changelog generation is disabled.
version: 2

project_name: ssh-pushkey

before:
  hooks:
    - go mod tidy

builds:
  - id: ssh-pushkey
    binary: ssh-pushkey
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      # match the previous release matrix (no windows/arm64)
      - goos: windows
        goarch: arm64
    ldflags:
      # keep the leading "v" to match the prior `-X main.version=v1.6.0`
      - -s -w -X main.version={{ .Tag }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  github:
    owner: kwrkb
    name: ssh-pushkey
