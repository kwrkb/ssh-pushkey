# GoReleaser config — GitHub is the canonical release/distribution source.
# GoReleaser's own changelog generation is disabled; the release body is set
# from CHANGELOG.md by a separate `gh release edit` step after GoReleaser
# publishes (see .github/workflows/release.yml).
# Note: GoReleaser's `--release-notes` flag is loaded inside the changelog
# pipe, so `changelog.disable: true` would silently skip it — hence the
# explicit post-publish step instead of `--release-notes`.
version: 2

project_name: ssh-pushkey

before:
  hooks:
    - go mod tidy

builds:
  - id: ssh-pushkey
    binary: ssh-pushkey
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      # match the previous release matrix (no windows/arm64)
      - goos: windows
        goarch: arm64
    ldflags:
      # keep the leading "v" to match the prior `-X main.version=v1.6.0`
      - -s -w -X main.version={{ .Tag }}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  github:
    owner: kwrkb
    name: ssh-pushkey
